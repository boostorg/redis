  windows-b2:
    name: "B2 ${{matrix.toolset}}"
    runs-on: ${{matrix.os}}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          #- { toolset: msvc-14.2, os: windows-2019 }
          - { toolset: msvc-14.3, os: windows-2022, address-model: 64 }
          - { toolset: msvc-14.3, os: windows-2022, address-model: 32 }
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup user-config.jam
      run: cp tools/user-config-win-gha.jam "${HOMEDRIVE}${HOMEPATH}/user-config.jam"

    - name: Setup Boost
      run: python3 tools/ci.py setup-boost --source-dir=$(pwd)
    
    - name: Build and run project tests using B2
      run: |
        python3 tools/ci.py run-b2-tests \
          --toolset ${{ matrix.toolset }} \
          --cxxstd 17,20 \
          --variant debug,release \
          --address-model ${{ matrix.address-model }}

